<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Login – EnrollX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page" style="background: linear-gradient(135deg, #0f766e 0%, #134e4a 25%, #005f73 50%, #0a9396 100%);">
    <div class="auth-shapes">
      <div class="shape shape-1" style="background: #14b8a6;"></div>
      <div class="shape shape-2" style="background: #0d9488;"></div>
      <div class="shape shape-3" style="background: #2dd4bf;"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="background: var(--gradient-teal);"><i class="bi bi-person-workspace"></i></div>
        <h2 style="background: var(--gradient-teal); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Faculty Portal</h2>
        <p>Sign in to your faculty account</p>
      </div>
      <form id="facultyLoginForm" onsubmit="loginFaculty(event)">
        <div class="form-floating">
          <input type="email" class="form-control" id="facultyEmail" placeholder="Email" required>
          <label><i class="bi bi-envelope me-2"></i>Faculty Email</label>
        </div>
        <div class="form-floating position-relative">
          <input type="password" class="form-control" id="facultyPassword" placeholder="Password" required>
          <label><i class="bi bi-lock me-2"></i>Password</label>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('facultyPassword', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <button type="submit" class="auth-btn" style="background: var(--gradient-teal);">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In as Faculty
        </button>
      </form>
      <div class="auth-divider">other portals</div>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-primary flex-fill rounded-pill" style="font-size:0.85rem;">
          <i class="bi bi-person me-1"></i>Student
        </a>
        <a href="admin-login.html" class="btn btn-outline-danger flex-fill rounded-pill" style="font-size:0.85rem;">
          <i class="bi bi-shield-lock me-1"></i>Admin
        </a>
      </div>
      <div class="text-center mt-3">
        <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
