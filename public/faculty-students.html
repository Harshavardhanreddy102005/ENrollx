<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Students – EnrollX Faculty</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="sidebar" style="background: linear-gradient(180deg, #134e4a 0%, #0f766e 50%, #115e59 100%);">
    <div class="sidebar-brand"><h4><i class="bi bi-mortarboard-fill"></i> EnrollX</h4><p>Faculty Portal</p></div>
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="faculty-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="faculty-students.html" class="sidebar-link active"><i class="bi bi-people"></i> Students</a>
      <a href="faculty-results.html" class="sidebar-link"><i class="bi bi-clipboard-data"></i> Manage Results</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="faculty-profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> Profile</a>
      <a href="#" class="sidebar-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
    <div class="nav-section" style="padding:0 1.5rem;"><button class="theme-toggle-sidebar"><i class="bi bi-moon-fill"></i></button></div>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar faculty-avatar-text">F</div><div><div class="user-name faculty-name">Faculty</div><div class="user-role faculty-dept">Department</div></div></div></div>
  </nav>
  <div class="sidebar-overlay"></div>
  <button class="sidebar-toggle"><i class="bi bi-list"></i></button>

  <div class="main-content">
    <div class="dashboard-header">
      <div class="welcome-text">
        <h2><i class="bi bi-people-fill me-2" style="color:var(--teal-500);"></i>Enrolled Students</h2>
        <p id="courseNameHeader">View students enrolled in your courses</p>
      </div>
      <div class="header-actions">
        <select class="form-select" id="courseSelector" onchange="loadCourseStudents(this.value)" style="border-radius:var(--radius-full);border:2px solid var(--border-color);min-width:250px;">
          <option value="">Select Course</option>
        </select>
      </div>
    </div>

    <div class="card-enrollx p-1">
      <span class="badge-enrollx badge-teal ms-3 mt-3" id="studentCount">0</span>
      <span class="ms-2" style="font-size:0.9rem;color:var(--text-secondary);">students enrolled</span>
      <div class="table-enrollx mt-2">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Student Name</th>
              <th>Student ID</th>
              <th>Department</th>
              <th>Semester</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/faculty.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initFacultyStudents);</script>
</body>
</html>
