<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration – EnrollX</title>
  <meta name="description" content="Create your EnrollX student account to start enrolling in courses.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <div class="auth-card register-card">
      <div class="auth-logo">
        <div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div>
        <h2 class="text-gradient">EnrollX</h2>
        <p>Create your student account</p>
      </div>
      <form id="registerForm" onsubmit="registerStudent(event)">
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="regName" placeholder="Full Name" required>
              <label><i class="bi bi-person me-2"></i>Full Name</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="regStudentId" placeholder="Student ID" required>
              <label><i class="bi bi-hash me-2"></i>Student ID</label>
            </div>
          </div>
        </div>
        <div class="form-floating mt-2">
          <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
          <label><i class="bi bi-envelope me-2"></i>Email Address</label>
        </div>
        <div class="form-floating mt-2 position-relative">
          <input type="password" class="form-control" id="regPassword" placeholder="Password" required minlength="6">
          <label><i class="bi bi-lock me-2"></i>Password (min 6 characters)</label>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('regPassword', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="row g-2 mt-1">
          <div class="col-md-6">
            <select class="form-select" id="regDepartment" required>
              <option value="" disabled selected>Select Department</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Information Technology">Information Technology</option>
              <option value="Electronics">Electronics</option>
              <option value="Electrical Engineering">Electrical Engineering</option>
              <option value="Mechanical Engineering">Mechanical Engineering</option>
              <option value="Civil Engineering">Civil Engineering</option>
              <option value="Chemical Engineering">Chemical Engineering</option>
              <option value="Biotechnology">Biotechnology</option>
              <option value="Mathematics">Mathematics</option>
              <option value="Physics">Physics</option>
              <option value="Business Administration">Business Administration</option>
            </select>
          </div>
          <div class="col-md-6">
            <select class="form-select" id="regSemester" required>
              <option value="" disabled selected>Select Semester</option>
              <option value="1">Semester 1</option>
              <option value="2">Semester 2</option>
              <option value="3">Semester 3</option>
              <option value="4">Semester 4</option>
              <option value="5">Semester 5</option>
              <option value="6">Semester 6</option>
              <option value="7">Semester 7</option>
              <option value="8">Semester 8</option>
            </select>
          </div>
        </div>
        <div class="form-floating mt-2">
          <input type="tel" class="form-control" id="regPhone" placeholder="Phone" required>
          <label><i class="bi bi-phone me-2"></i>Phone Number</label>
        </div>
        <button type="submit" class="auth-btn mt-3">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>
      <div class="auth-links">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
      <div class="text-center mt-2">
        <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
