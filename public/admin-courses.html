<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Courses – EnrollX Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="sidebar" style="background: linear-gradient(180deg, #005f73 0%, #0a9396 50%, #00bcd4 100%);">
    <div class="sidebar-brand"><h4><i class="bi bi-shield-lock-fill"></i> EnrollX</h4><p>Admin Panel</p></div>
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="admin-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="admin-courses.html" class="sidebar-link active"><i class="bi bi-journal-bookmark"></i> Courses</a>
      <a href="admin-students.html" class="sidebar-link"><i class="bi bi-people"></i> Students</a>
      <a href="admin-faculty.html" class="sidebar-link"><i class="bi bi-person-workspace"></i> Faculty</a>
      <a href="admin-admins.html" class="sidebar-link"><i class="bi bi-shield-lock"></i> Administrators</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="#" class="sidebar-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
    <div class="nav-section" style="padding:0 1.5rem;"><button class="theme-toggle-sidebar"><i class="bi bi-moon-fill"></i></button></div>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar admin-avatar-text">A</div><div><div class="user-name admin-name">Admin</div><div class="user-role">Administrator</div></div></div></div>
  </nav>
  <div class="sidebar-overlay"></div>
  <button class="sidebar-toggle"><i class="bi bi-list"></i></button>

  <div class="main-content">
    <div class="dashboard-header">
      <div class="welcome-text">
        <h2><i class="bi bi-journal-bookmark-fill me-2 text-gradient"></i>Course Management</h2>
        <p>Add, edit, and manage all courses</p>
      </div>
      <div class="header-actions">
        <span class="badge-enrollx badge-purple"><span id="adminCoursesCount">0</span> total courses</span>
        <button class="btn btn-primary-gradient btn-enrollx" data-bs-toggle="modal" data-bs-target="#courseModal" onclick="resetCourseForm()">
          <i class="bi bi-plus-circle me-2"></i>Add Course
        </button>
      </div>
    </div>

    <div class="card-enrollx p-1">
      <div class="table-enrollx">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>#</th>
                <th>Course Name</th>
                <th>Code</th>
                <th>Credits</th>
                <th>Department</th>
                <th>Semester</th>
                <th>Faculty</th>
                <th>Seats</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminCoursesBody">
              <tr><td colspan="9" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Course Modal -->
  <div class="modal fade" id="courseModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content modal-enrollx">
        <div class="modal-header">
          <h5 class="modal-title" id="courseModalLabel"><i class="bi bi-journal-plus me-2"></i>Add New Course</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="courseForm" onsubmit="saveCourse(event)" class="form-enrollx">
            <input type="hidden" id="courseDocId">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label">Course Name *</label>
                <input type="text" class="form-control" id="courseName" placeholder="e.g., Data Structures & Algorithms" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Course Code *</label>
                <input type="text" class="form-control" id="courseCode" placeholder="e.g., CS301" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Credits *</label>
                <input type="number" class="form-control" id="courseCredits" min="1" max="10" placeholder="e.g., 4" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Department *</label>
                <select class="form-select" id="courseDepartment" required>
                  <option value="" disabled selected>Select</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="Information Technology">Information Technology</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Electrical Engineering">Electrical Engineering</option>
                  <option value="Mechanical Engineering">Mechanical Engineering</option>
                  <option value="Civil Engineering">Civil Engineering</option>
                  <option value="Chemical Engineering">Chemical Engineering</option>
                  <option value="Biotechnology">Biotechnology</option>
                  <option value="Mathematics">Mathematics</option>
                  <option value="Physics">Physics</option>
                  <option value="Business Administration">Business Administration</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Semester *</label>
                <select class="form-select" id="courseSemester" required>
                  <option value="" disabled selected>Select</option>
                  <option value="1">Semester 1</option>
                  <option value="2">Semester 2</option>
                  <option value="3">Semester 3</option>
                  <option value="4">Semester 4</option>
                  <option value="5">Semester 5</option>
                  <option value="6">Semester 6</option>
                  <option value="7">Semester 7</option>
                  <option value="8">Semester 8</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Total Seats *</label>
                <input type="number" class="form-control" id="courseSeats" min="1" max="500" placeholder="e.g., 60" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Assign Faculty</label>
                <select class="form-select" id="courseFaculty">
                  <option value="">Unassigned</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="courseDescription" rows="3" placeholder="Course description..."></textarea>
              </div>
            </div>
            <div class="mt-3 text-end">
              <button type="button" class="btn btn-secondary rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary-gradient btn-enrollx"><i class="bi bi-check-lg me-2"></i>Save Course</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initAdminCourses);</script>
</body>
</html>
