<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students – EnrollX Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="sidebar" style="background: linear-gradient(180deg, #005f73 0%, #0a9396 50%, #00bcd4 100%);">
    <div class="sidebar-brand"><h4><i class="bi bi-shield-lock-fill"></i> EnrollX</h4><p>Admin Panel</p></div>
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="admin-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="admin-courses.html" class="sidebar-link"><i class="bi bi-journal-bookmark"></i> Courses</a>
      <a href="admin-students.html" class="sidebar-link active"><i class="bi bi-people"></i> Students</a>
      <a href="admin-faculty.html" class="sidebar-link"><i class="bi bi-person-workspace"></i> Faculty</a>
      <a href="admin-admins.html" class="sidebar-link"><i class="bi bi-shield-lock"></i> Administrators</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="#" class="sidebar-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
    <div class="nav-section" style="padding:0 1.5rem;"><button class="theme-toggle-sidebar"><i class="bi bi-moon-fill"></i></button></div>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar admin-avatar-text">A</div><div><div class="user-name admin-name">Admin</div><div class="user-role">Administrator</div></div></div></div>
  </nav>
  <div class="sidebar-overlay"></div>
  <button class="sidebar-toggle"><i class="bi bi-list"></i></button>

  <div class="main-content">
    <div class="dashboard-header">
      <div class="welcome-text">
        <h2><i class="bi bi-people-fill me-2 text-gradient"></i>Student Management</h2>
        <p>View and manage all registered students</p>
      </div>
      <div class="header-actions">
        <span class="badge-enrollx badge-blue"><span id="adminStudentsCount">0</span> students</span>
        <div class="search-wrapper" style="min-width:250px;">
          <i class="bi bi-search"></i>
          <input type="text" class="search-input" id="studentSearch" placeholder="Search students..." oninput="searchStudents()">
        </div>
      </div>
    </div>

    <div class="card-enrollx p-1">
      <div class="table-enrollx">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Student ID</th>
                <th>Email</th>
                <th>Department</th>
                <th>Semester</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminStudentsBody">
              <tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Student Modal -->
  <div class="modal fade" id="editStudentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-enrollx">
        <div class="modal-header" style="background:var(--gradient-primary);">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Student Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="editStudentForm" onsubmit="saveStudentEdit(event)" class="form-enrollx">
            <input type="hidden" id="editStudentDocId">
            <div class="mb-3">
              <label class="form-label">Full Name *</label>
              <input type="text" class="form-control" id="editStudentName" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Student ID</label>
                <input type="text" class="form-control" id="editStudentRegId" disabled>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Email (Cannot change)</label>
                <input type="email" class="form-control" id="editStudentEmail" disabled>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Department *</label>
                <select class="form-select" id="editStudentDept" required>
                  <option value="" disabled>Select Department</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="Information Technology">Information Technology</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Electrical Engineering">Electrical Engineering</option>
                  <option value="Mechanical Engineering">Mechanical Engineering</option>
                  <option value="Civil Engineering">Civil Engineering</option>
                  <option value="Mathematics">Mathematics</option>
                  <option value="Physics">Physics</option>
                  <option value="Business Administration">Business Administration</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Semester *</label>
                <select class="form-select" id="editStudentSem" required>
                  <option value="1">Semester 1</option><option value="2">Semester 2</option>
                  <option value="3">Semester 3</option><option value="4">Semester 4</option>
                  <option value="5">Semester 5</option><option value="6">Semester 6</option>
                  <option value="7">Semester 7</option><option value="8">Semester 8</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="editStudentPhone">
            </div>
            <div class="text-end">
              <button type="button" class="btn btn-secondary rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary rounded-pill btn-enrollx"><i class="bi bi-check-lg me-2"></i>Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initAdminStudents);</script>
</body>
</html>
