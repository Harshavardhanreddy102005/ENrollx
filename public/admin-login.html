<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – EnrollX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page" style="background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 25%, #005f73 50%, #0a9396 100%);">
    <div class="auth-shapes">
      <div class="shape shape-1" style="background: #ef4444;"></div>
      <div class="shape shape-2" style="background: #dc2626;"></div>
      <div class="shape shape-3" style="background: #f87171;"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon" style="background: linear-gradient(135deg, #dc2626, #ef4444);"><i class="bi bi-shield-lock-fill"></i></div>
        <h2 style="background: linear-gradient(135deg, #dc2626, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Admin Portal</h2>
        <p>Authorized administrators only</p>
      </div>
      <form id="adminLoginForm" onsubmit="loginAdmin(event)">
        <div class="form-floating">
          <input type="email" class="form-control" id="adminEmail" placeholder="Email" required>
          <label><i class="bi bi-envelope me-2"></i>Admin Email</label>
        </div>
        <div class="form-floating position-relative">
          <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
          <label><i class="bi bi-lock me-2"></i>Password</label>
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('adminPassword', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <button type="submit" class="auth-btn" style="background: linear-gradient(135deg, #dc2626, #ef4444);">
          <i class="bi bi-shield-check me-2"></i>Sign In as Admin
        </button>
      </form>
      <div class="auth-divider">other portals</div>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-primary flex-fill rounded-pill" style="font-size:0.85rem;">
          <i class="bi bi-person me-1"></i>Student
        </a>
        <a href="faculty-login.html" class="btn btn-outline-success flex-fill rounded-pill" style="font-size:0.85rem;">
          <i class="bi bi-person-workspace me-1"></i>Faculty
        </a>
      </div>
      <div class="text-center mt-3">
        <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
