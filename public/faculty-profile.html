<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Profile – EnrollX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="sidebar" style="background: linear-gradient(180deg, #134e4a 0%, #0f766e 50%, #115e59 100%);">
    <div class="sidebar-brand"><h4><i class="bi bi-mortarboard-fill"></i> EnrollX</h4><p>Faculty Portal</p></div>
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="faculty-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="faculty-students.html" class="sidebar-link"><i class="bi bi-people"></i> Students</a>
      <a href="faculty-results.html" class="sidebar-link"><i class="bi bi-clipboard-data"></i> Manage Results</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="faculty-profile.html" class="sidebar-link active"><i class="bi bi-person-circle"></i> Profile</a>
      <a href="#" class="sidebar-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
    <div class="nav-section" style="padding:0 1.5rem;"><button class="theme-toggle-sidebar"><i class="bi bi-moon-fill"></i></button></div>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar faculty-avatar-text">F</div><div><div class="user-name faculty-name">Faculty</div><div class="user-role faculty-dept">Department</div></div></div></div>
  </nav>
  <div class="sidebar-overlay"></div>
  <button class="sidebar-toggle"><i class="bi bi-list"></i></button>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="bi bi-person-circle me-2" style="color:var(--teal-500);"></i>Faculty Profile</h2>
      <p>View your faculty profile information</p>
    </div>
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="profile-card">
          <div class="profile-banner" style="background:var(--gradient-teal);">
            <div class="profile-avatar faculty-avatar-text">F</div>
          </div>
          <div class="profile-info">
            <h3 class="faculty-name">Faculty Name</h3>
            <p class="profile-role"><span class="faculty-designation">Designation</span> • <span class="faculty-dept">Department</span></p>
          </div>
        </div>
        <div class="profile-details mt-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>Faculty Information</h5>
          <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value" id="faculty-profile-name">-</span></div>
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" id="faculty-profile-email">-</span></div>
          <div class="detail-row"><span class="detail-label">Department</span><span class="detail-value" id="faculty-profile-department">-</span></div>
          <div class="detail-row"><span class="detail-label">Designation</span><span class="detail-value" id="faculty-profile-designation">-</span></div>
          <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" id="faculty-profile-phone">-</span></div>
          <div class="detail-row"><span class="detail-label">Joined</span><span class="detail-value" id="faculty-profile-joined">-</span></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/faculty.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initFacultyProfile);</script>
</body>
</html>
