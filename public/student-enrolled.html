<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Enrolled Courses – EnrollX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand"><h4><i class="bi bi-mortarboard-fill"></i> EnrollX</h4><p>Student Portal</p></div>
    <div class="nav-section">
      <div class="nav-section-title">Main Menu</div>
      <a href="student-dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="student-courses.html" class="sidebar-link"><i class="bi bi-journal-bookmark"></i> Browse Courses</a>
      <a href="student-enrolled.html" class="sidebar-link active"><i class="bi bi-bookmark-check"></i> My Courses</a>
      <a href="student-results.html" class="sidebar-link"><i class="bi bi-graph-up"></i> Results</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Account</div>
      <a href="student-profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> Profile</a>
      <a href="#" class="sidebar-link" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </div>
    <div class="nav-section" style="padding:0 1.5rem;"><button class="theme-toggle-sidebar" title="Toggle theme"><i class="bi bi-moon-fill"></i></button></div>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar student-avatar-text">S</div><div><div class="user-name student-name">Student</div><div class="user-role student-dept">Department</div></div></div></div>
  </nav>
  <div class="sidebar-overlay"></div>
  <button class="sidebar-toggle"><i class="bi bi-list"></i></button>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="bi bi-bookmark-check-fill me-2 text-gradient"></i>My Enrolled Courses</h2>
      <p>Manage your current course enrollments</p>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-auto">
        <div class="card-enrollx p-3 d-flex align-items-center gap-3">
          <div style="width:45px;height:45px;border-radius:12px;background:var(--gradient-card-blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;"><i class="bi bi-journal-check"></i></div>
          <div><div style="font-size:0.8rem;color:var(--text-muted);">Enrolled Courses</div><div style="font-size:1.5rem;font-weight:800;" id="enrolledCoursesCount">0</div></div>
        </div>
      </div>
      <div class="col-auto">
        <div class="card-enrollx p-3 d-flex align-items-center gap-3">
          <div style="width:45px;height:45px;border-radius:12px;background:var(--gradient-card-purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;"><i class="bi bi-star-fill"></i></div>
          <div><div style="font-size:0.8rem;color:var(--text-muted);">Total Credits</div><div style="font-size:1.5rem;font-weight:800;" id="totalCredits">0</div></div>
        </div>
      </div>
    </div>

    <div class="row g-4" id="enrolledList">
      <div class="col-12 text-center p-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Loading enrollments...</p></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/student.js"></script>
  <script src="js/courses.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initEnrolledCourses);</script>
</body>
</html>
