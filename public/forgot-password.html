<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – EnrollX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon"><i class="bi bi-key-fill"></i></div>
        <h2 class="text-gradient">Reset Password</h2>
        <p>Enter your email to receive a reset link</p>
      </div>
      <form id="resetForm" onsubmit="resetPassword(event)">
        <div class="form-floating">
          <input type="email" class="form-control" id="resetEmail" placeholder="Email" required>
          <label><i class="bi bi-envelope me-2"></i>Email Address</label>
        </div>
        <button type="submit" class="auth-btn">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </form>
      <div class="auth-links">
        Remember your password? <a href="login.html">Sign In</a>
      </div>
      <div class="text-center mt-2">
        <a href="index.html" style="font-size:0.85rem;color:var(--text-muted);"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
